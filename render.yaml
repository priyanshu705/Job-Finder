services:
  - type: web
    name: autoapply-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 wsgi:app
    envVars:
      - key: PYTHONPATH
        value: src
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_URL
        sync: false   # Set this in Render dashboard from Supabase
      - key: CORS_ORIGINS
        sync: false   # Set to your Vercel URL e.g. https://autoapply-ai.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: API_HOST
        value: "0.0.0.0"
