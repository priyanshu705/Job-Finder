services:
  - type: web
    name: autoapply-ai-backend
    runtime: python
    region: singapore   # closest to India — low latency
    plan: free

    # ── Build ────────────────────────────────────────────────────────────────
    buildCommand: pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=0 python -m playwright install --with-deps chromium && PLAYWRIGHT_BROWSERS_PATH=0 python scripts/ensure_playwright.py

    # ── Start ────────────────────────────────────────────────────────────────
    # 1 worker (free tier limit). timeout increased for long-running jobs.
    # Verify Chromium exists before Gunicorn imports code that can launch Playwright.
    startCommand: python scripts/ensure_playwright.py && gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload wsgi:app

    # ── Health check ─────────────────────────────────────────────────────────
    healthCheckPath: /api/health

    # ── Environment variables ────────────────────────────────────────────────
    envVars:
      - key: PYTHONPATH
        value: src

      - key: FLASK_ENV
        value: production

      - key: FLASK_DEBUG
        value: "0"

      - key: API_HOST
        value: "0.0.0.0"

      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"

      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "false"

      # ── Set these in Render Dashboard (DO NOT hardcode secrets) ────────────
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: DATABASE_URL
        sync: false   # e.g. Supabase/Postgres URL

      - key: CORS_ORIGINS
        sync: false   # e.g. https://your-frontend.vercel.app

      - key: SECRET_KEY
        generateValue: true
